controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    torso_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    left_gripper_controller:
      type: position_controllers/GripperActionController
    right_gripper_controller:
      type: position_controllers/GripperActionController

head_controller:
  ros__parameters:
    joints: [neck_yaw_joint, neck_pitch_joint]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_partial_joints_goal: false

left_arm_controller:
  ros__parameters:
    joints: [l_arm_joint1, l_arm_joint2, l_arm_joint3, l_arm_joint4, l_arm_joint5, l_arm_joint6]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_partial_joints_goal: false

right_arm_controller:
  ros__parameters:
    joints: [r_arm_joint1, r_arm_joint2, r_arm_joint3, r_arm_joint4, r_arm_joint5, r_arm_joint6]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    allow_partial_joints_goal: false

torso_controller:
  ros__parameters:
    joints: [waist_yaw_joint]
    command_interfaces: [position]
    state_interfaces: [position, velocity]

left_gripper_controller:
  ros__parameters:
    joint: l_gripper_joint
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 100.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0

right_gripper_controller:
  ros__parameters:
    joint: r_gripper_joint
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 100.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
